name: CI

on:
  pull_request:
    branches: [main]

# CI runs typecheck + tests on PRs. The deploy workflow (deploy.yml) runs
# the full check-build-ship pipeline on pushes to main, so this file only
# needs to gate PRs.

jobs:
  astro:
    name: astro
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Test
        run: pnpm test
