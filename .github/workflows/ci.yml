name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gscan:
    name: gscan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate theme with gscan
        run: npx --yes gscan@latest theme --fatal
