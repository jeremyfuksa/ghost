# nginx config for the astro-web container.
# Replaces the stock /etc/nginx/conf.d/default.conf.
#
# Adds:
# - Homepage Link: response headers for agent discovery (RFC 8288)
# - Accept: text/markdown content negotiation backed by static .md companions
#
# `text/markdown md;` is already in the image's mime.types, so .md files
# served directly carry the right Content-Type.

map $http_accept $want_md {
    default          0;
    "~*text/markdown" 1;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;

    # Homepage: advertise discoverable resources via Link headers,
    # and serve /index.md when the client prefers markdown.
    location = / {
        add_header Link "</sitemap-index.xml>; rel=\"sitemap\", </rss.xml>; rel=\"alternate\"; type=\"application/rss+xml\", </about/>; rel=\"author\", </index.md>; rel=\"alternate\"; type=\"text/markdown\"" always;

        if ($want_md) {
            rewrite ^ /index.md last;
        }
        try_files /index.html =404;
    }

    location / {
        # Agent prefers markdown? Rewrite trailing-slash URLs to their .md
        # companion (e.g. /about/ -> /about.md, /work/foo/ -> /work/foo.md).
        # Falls through to try_files if no .md exists for that path.
        if ($want_md) {
            rewrite ^(/.+)/$ $1.md last;
        }
        try_files $uri $uri/ $uri.html =404;
        index index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
